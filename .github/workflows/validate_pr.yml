name: Validate ARACHNE Rule PR
on:
  pull_request:
    branches: ["*"]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reject PRs touching protected files
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          echo "Changed files: $CHANGED"
          for f in watchdog.py validate_pr.yml; do
            if echo "$CHANGED" | grep -q "$f"; then
              echo "PROTECTED FILE MODIFIED: $f"
              exit 1
            fi
          done
          echo "Protected file check passed"

      - name: Check IMO gate for parser modifications
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          if echo "$CHANGED" | grep -q "bert_parser.py"; then
            if [ ! -f arachne/imo_gate.json ]; then
              echo "Parser modification rejected: IMO gate file missing"
              exit 1
            fi
            PASSED=$(python3 -c "import json; d=json.load(open('arachne/imo_gate.json')); print(d.get('IMO_THRESHOLD_PASSED', False))" 2>/dev/null || echo "False")
            if [ "$PASSED" != "True" ]; then
              echo "Parser modification rejected: IMO threshold not met (score: $PASSED)"
              exit 1
            fi
          fi
          echo "IMO gate check passed"

      - name: Install clipspy and validate CLIPS syntax
        run: |
          pip install clipspy --quiet
          python3 - <<'EOF'
          import clips, sys
          env = clips.Environment()
          try:
              import os
              for path in ["arachne/rulebase.clp", "rulebase.clp"]:
                  if os.path.exists(path):
                      env.load(path)
                      rules = list(env.rules())
                      print(f"CLIPS syntax valid — {len(rules)} rules loaded from {path}")
                      sys.exit(0)
              print("rulebase.clp not found")
              sys.exit(1)
          except Exception as e:
              print(f"CLIPS syntax error: {e}")
              sys.exit(1)
          EOF

      - name: Auto-merge
        if: success()
        uses: pascalgn/automerge-action@v0.16.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_METHOD: squash
          MERGE_LABELS: ""
          UPDATE_METHOD: rebase
