name: Validate ARACHNE Rule PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install clipspy
        run: |
          pip install clipspy==1.0.0 --quiet
          python3 -c "import clips; print('clipspy ready')"

      - name: Validate CLIPS rulebase
        run: |
          python3 << 'EOF'
import clips, sys, os

env = clips.Environment()
found = None
for p in ["arachne/rulebase.clp", "rulebase.clp"]:
    if os.path.exists(p):
        found = p
        break

if not found:
    print("rulebase.clp not found. Files:", os.listdir("."))
    sys.exit(1)

try:
    env.load(found)
except Exception as e:
    print("CLIPS error:", e)
    sys.exit(1)

rules = list(env.rules())
names = [r.name for r in rules]
dupes = set(n for n in names if names.count(n) > 1)
if dupes:
    print("DUPLICATE RULES:", dupes)
    sys.exit(1)

print(f"OK — {len(rules)} rules, 0 duplicates, path={found}")
EOF

      - name: Merge PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --squash \
            --delete-branch \
            --subject "ARACHNE rule induction — PR #${{ github.event.pull_request.number }}" \
            || echo "Merge failed — PR stays open"
